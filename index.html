<!DOCTYPE html>
<html>
<head>
  <title>StudySathi AI</title>
  <style>
    body { font-family: Arial; max-width: 700px; margin: 50px auto; padding: 20px; }
    textarea { width: 100%; height: 150px; margin: 10px 0; }
    button { padding: 10px 20px; margin: 5px; cursor: pointer; background: #4CAF50; color: white; border: none; }
    #output { margin-top: 20px; white-space: pre-wrap; background: #f0f0f0; padding: 15px; }
  </style>
</head>
<body>
  <h1>📚 StudySathi AI</h1>
  <textarea id="notes" placeholder="Paste your notes here..."></textarea>
  <br>
  <button onclick="summarize()">Summarize + Quiz</button>
  <button onclick="mockInterview()">Start Mock Interview</button>
  <div id="output"></div>

  <script>
    async function summarize() {
      const notes = document.getElementById('notes').value;
      document.getElementById('output').innerText = "Loading...";
      const res = await fetch('/api/generate', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ notes: "Summarize this and make 3 MCQs: " + notes })
      });
      const data = await res.json();
      document.getElementById('output').innerText = data.result || data.error;
    }

    async function mockInterview() {
      const notes = document.getElementById('notes').value;
      document.getElementById('output').innerText = "Loading...";
      const res = await fetch('/api/generate', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ notes: "Act as an interviewer. Based on these notes: " + notes + ". Ask 5 interview questions with answers." })
      });
      const data = await res.json();
      document.getElementById('output').innerText = data.result || data.error;
    }
  </script>
</body>
</html>
