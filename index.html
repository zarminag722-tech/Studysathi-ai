<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>StudySathi AI</title>
  <style>
    body { font-family: Arial; max-width: 700px; margin: 50px auto; padding: 20px; background:#f5f5f5; }
    textarea { width: 100%; height: 150px; margin: 10px 0; padding:10px; }
    button { padding: 12px 20px; margin: 5px; cursor: pointer; background:#4CAF50; color:white; border:none; border-radius:5px; }
    button:hover { background:#45a049; }
    #output { margin-top: 20px; padding:15px; background:white; border-radius:5px; white-space: pre-wrap; }
  </style>
</head>
<body>
  <h1>📚 StudySathi AI</h1>
  <p>Paste your notes below</p>
  <textarea id="notes" placeholder="Paste your notes here..."></textarea>
  <br>
  <button onclick="summarize()">Summarize + Quiz</button>
  <button onclick="mockInterview()">Start Mock Interview</button>
  <div id="output"></div>

  <script>
    async function summarize() {
      const notes = document.getElementById('notes').value;
      document.getElementById('output').innerText = "Loading...";
      const res = await fetch('/api/generate', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ notes: "Summarize this and make 3 MCQs: " + notes })
      });
      const data = await res.json();
      document.getElementById('output').innerText = data.result || data.error;
    }

    async function mockInterview() {
      const notes = document.getElementById('notes').value;
      document.getElementById('output').innerText = "Loading...";
      const res = await fetch('/api/generate', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ notes: "Act as an interviewer. Based on these notes: " + notes + ". Ask 5 interview questions with answers." })
      });
      const data = await res.json();
      document.getElementById('output').innerText = data.result || data.error;
    }
  </script>
</body>
</html>
