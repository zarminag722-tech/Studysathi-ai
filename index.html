<!DOCTYPE html>
<html>
<head>
<title>StudySathi AI</title>
<style>
  body { font-family: Arial; padding: 30px; background: #f5f5f5; text-align: center; }
  h1 { color: #4CAF50; }
  textarea { width: 80%; height: 150px; padding: 10px; font-size: 16px; border: 2px solid #4CAF50; border-radius: 8px; }
  button { padding: 12px 25px; background: #4CAF50; color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; margin: 10px; }
  button:hover { background: #45a049; }
  pre { background: white; padding: 20px; margin-top: 20px; border-radius: 8px; text-align: left; white-space: pre-wrap; min-height: 100px; }
</style>
</head>
<body>

<h1>📚 StudySathi AI</h1>

<textarea id="notes" placeholder="Paste your notes here..."></textarea>
<br>
<button onclick="generate()">Summarize + Quiz</button>
<br>
<button onclick="mockInterview()">Start Mock Interview</button> 

<pre id="output">Yahan Summary + Quiz aayega</pre>

<script>
async function generate() {
  const notes = document.getElementById('notes').value;
  const output = document.getElementById('output');
  output.innerText = "Loading...";
  const res = await fetch('/api/generate', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({notes})
  });
  const data = await res.json();
  output.innerText = data.result || "Error: " + JSON.stringify(data);
}
async function mockInterview() {
  const notes = document.getElementById('notes').value;
  const output = document.getElementById('output');
  if(!notes) { alert('Pehle notes paste karo'); return; }

  output.innerText = "Loading Mock Interview...";
  const res = await fetch('/api/generate', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({notes: notes + "\n\nTask: Based on these notes, act like an interviewer. Ask 5 tough interview questions with model answers."})
  });
  const data = await res.json();
  output.innerText = data.result || "Error: " + JSON.stringify(data);
}
</script>

</body>
</html>
