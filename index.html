<!DOCTYPE html>
<html>
<head>
<title>StudySathi AI - All in One</title>
<style>
    body { font-family: Arial; padding: 20px; background: #f5f5f5; }
    .tabs { margin-bottom: 20px; }
    .tab { padding: 10px 20px; cursor: pointer; border: none; background: #ddd; margin-right: 5px; border-radius: 5px; font-weight: bold; }
    .tab.active { background: #4CAF50; color: white; }
    .content { display: none; padding: 20px; background: white; margin-top: 10px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    .content.active { display: block; }
    textarea, input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
    button { padding: 10px 20px; background: #4CAF50; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
    button:hover { background: #45a049; }
    pre { background: #f0f0f0; padding: 15px; border-radius: 5px; white-space: pre-wrap; }
</style>
</head>
<body>
<h1>📚 StudySathi AI</h1>

<div class="tabs">
    <button class="tab active" onclick="showTab('summarizer')">StudySathi</button>
    <button class="tab" onclick="showTab('interviewer')">AI Mock Interview</button>
</div>

<div id="summarizer" class="content active">
    <h2>Text Summarizer + MCQ Generator</h2>
    <textarea id="notes" rows="10" placeholder="Paste your notes or chapter here..."></textarea>
    <button onclick="summarize()">Generate Summary + Quiz</button>
    <div id="output"></div>
</div>

<div id="interviewer" class="content">
    <h2>AI Mock Interview</h2>
    <input id="jobTitle" placeholder="Enter Job Title: e.g. Frontend Developer">
    <button onclick="startInterview()">Start Interview</button>
    <div id="interviewOutput"></div>
</div>

<script>
    const API_KEY = "GEMINI_API_KEY";  // Yahan apni Gemini API key daalni hai
    
    function showTab(tabName) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
        document.getElementById(tabName).classList.add('active');
        event.target.classList.add('active');
    }
    
    async function callGemini(prompt) {
        const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
            method: 'POST', 
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({contents: [{parts: [{text: prompt}]}]})
        });
        const data = await res.json();
        return data.candidates[0].content.parts[0].text;
    }
    
    async function summarize() {
        const notes = document.getElementById('notes').value;
        if(!notes) return alert("Please paste some notes first!");
        document.getElementById('output').innerHTML = "Loading...";
        const prompt = `Summarize this in 3 bullet points and create 5 MCQs with answers: ${notes}`;
        const result = await callGemini(prompt);
        document.getElementById('output').innerHTML = `<pre>${result}</pre>`;
    }
    
    async function startInterview() {
        const job = document.getElementById('jobTitle').value;
        if(!job) return alert("Please enter a job title first!");
        document.getElementById('interviewOutput').innerHTML = "Loading...";
        const prompt = `You are an HR interviewer. Ask 5 interview questions for a ${job} role, one by one.`;
        const result = await callGemini(prompt);
        document.getElementById('interviewOutput').innerHTML = `<pre>${result}</pre>`;
    }
</script>
</body>
</html>
